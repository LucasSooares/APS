<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaCha20</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>ChaCha20</h1>
        <p>Digite sua mensagem para criptografar ou cole o resultado hexadecimal para descriptografar.</p>

        <form id="appForm">
            <label for="texto">Texto</label>
            <textarea id="texto" name="text" placeholder="Digite a mensagem ou o hexadecimal"></textarea>

            <label for="chave">Chave</label>
            <input id="chave" name="key" type="text" placeholder="A chave aparecerá aqui ao criptografar, cole-a para descriptografar">

            <div class="modo">
                <button type="submit" data-action="encrypt">Criptografar</button>
                <button type="submit" data-action="decrypt">Descriptografar</button>
            </div>
        </form>

        <p class="mensagem"></p>

        <label for="resultado">Resultado</label>
        <textarea id="resultado" readonly placeholder="O resultado aparecerá aqui"></textarea>
    </main>

    <script>
        const form = document.getElementById('appForm');
        const mensagem = document.querySelector('.mensagem');
        const resultado = document.getElementById('resultado');
        const chave = document.getElementById('chave');

        form.addEventListener('submit', async event => {
            event.preventDefault();
            const action = event.submitter ? event.submitter.dataset.action : 'encrypt';
            const text = document.getElementById('texto').value;
            const key = chave.value;

            mensagem.textContent = '';
            resultado.value = '';

            try {
                // Envia os dados ao backend usando JSON.
                // O servidor espera receber um objeto com action, text e key.
                const resposta = await fetch('/crypt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, text, key })
                });

                // Recebe a resposta JSON do servidor.
                // Ele devolve mensagem, resultado e, no encrypt, a chave gerada.
                const dados = await resposta.json();
                mensagem.textContent = dados.mensagem || '';
                resultado.value = dados.resultado || '';
                if (dados.key !== undefined) {
                    chave.value = dados.key;
                }
            } catch (erro) {
                mensagem.textContent = 'Erro de comunicação com o servidor.';
            }
        });
    </script>
</body>
</html>
