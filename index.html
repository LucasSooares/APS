<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaCha20</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>ChaCha20</h1>

        <!-- Esse formulário envia os dados para o servidor Python em /crypt -->
        <form action="/crypt" method="post">
            <label for="texto">Texto</label>
            <!-- name="text" corresponde ao campo lido pelo Python -->
            <textarea id="texto" name="text" placeholder="Digite a mensagem ou o hexadecimal"></textarea>

            <label for="chave">Chave</label>
            <!-- name="key" corresponde à chave lida pelo Python -->
            <input id="chave" name="key" type="text" placeholder="Digite a chave" />

            <div class="modo">
                <!-- O botão Cryptografar envia action=encrypt -->
                <button type="submit" name="action" value="encrypt">Criptografar</button>
                <!-- O botão Descriptografar envia action=decrypt -->
                <button type="submit" name="action" value="decrypt">Descriptografar</button>
            </div>
        </form>

        <!-- Essa área é apenas um espaço visual na página inicial. -->
        <!-- O resultado real aparece na página retornada pelo servidor após o envio do formulário. -->
        <p class="mensagem"></p>

        <label for="resultado">Resultado</label>
        <textarea id="resultado" readonly placeholder="O resultado aparecerá aqui"></textarea>
    </main>
</body>
</html>
