<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaCha20</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <header>
            <h1>Criptografia ChaCha20</h1>
            <p>Digite uma mensagem, gere o texto criptografado e use a mesma chave para descriptografar.</p>
        </header>

        <section class="painel">
            <div class="botoes-modo">
                <button id="btn-encrypt" class="ativo">Criptografar</button>
                <button id="btn-decrypt">Descriptografar</button>
            </div>

            <label for="input-text" id="input-label">Mensagem</label>
            <textarea id="input-text" placeholder="Digite sua mensagem"></textarea>
            <span id="char-counter">0 caracteres</span>

            <div id="key-area" class="campo escondido">
                <label for="key-input">Chave</label>
                <input id="key-input" type="text" placeholder="Digite a chave usada na criptografia">
            </div>

            <button id="action-btn" class="botao-principal">Criptografar</button>
            <p id="message-area"></p>
        </section>

        <section class="painel">
            <div class="resultado-topo">
                <label for="output-text">Resultado</label>
                <button id="copy-btn" class="botao-secundario">Copiar</button>
            </div>
            <textarea id="output-text" readonly placeholder="O resultado aparecerá aqui"></textarea>

            <div id="result-key-area" class="campo chave-gerada escondido">
                <label for="result-key-input">Chave gerada</label>
                <div class="linha-chave">
                    <input id="result-key-input" type="text" readonly>
                    <button id="copy-result-key-btn" class="botao-secundario">Copiar</button>
                </div>
                <small>Guarde essa chave para descriptografar depois.</small>
            </div>
        </section>

        <section class="painel">
            <div class="resultado-topo">
                <h2>Histórico</h2>
                <button id="clear-log-btn" class="botao-secundario">Limpar</button>
            </div>
            <div id="log-list" class="historico">
                <p>Nenhuma operação feita ainda.</p>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
